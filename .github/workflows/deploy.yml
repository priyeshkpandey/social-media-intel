name: Deploy Pages

on:
  workflow_run:
    workflows: ["Weekly refresh"]
    types: [completed]
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    # Skip when triggered by a failed `Weekly refresh` workflow.
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: site/package-lock.json

      - name: Install deps
        working-directory: site
        run: npm ci

      - name: Build
        working-directory: site
        run: npm run build

      - name: Bundle latest dashboard.json into the Pages artifact
        # GitHub release assets don't send CORS headers, so the site can't
        # fetch them cross-origin from Pages. We download dashboard.json
        # from the latest release at deploy time and serve it same-origin.
        # The /releases/latest/download/<name> convenience URL redirects
        # to whichever asset is on the latest non-prerelease release.
        run: |
          set -euo pipefail
          if curl -sSL --fail \
              "https://github.com/${{ github.repository }}/releases/latest/download/dashboard.json" \
              -o site/dist/dashboard.json; then
            echo "Bundled dashboard.json ($(wc -c < site/dist/dashboard.json) bytes)"
          else
            echo "::warning::No release yet — site will show 'No data available' until refresh runs"
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
